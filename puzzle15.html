<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15-Tile Sliding Puzzle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #info {
      margin-bottom: 1rem;
      font-size: 1rem;
      color: #aaa;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-template-rows: repeat(4, 100px);
      gap: 6px;
      background: #16213e;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .tile {
      width: 100px;
      height: 100px;
      background: #0f3460;
      border: 2px solid #e94560;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, transform 0.1s;
    }

    .tile:hover {
      background: #1a4a80;
      transform: scale(1.05);
    }

    .tile.empty {
      background: transparent;
      border: 2px dashed #333;
      cursor: default;
      pointer-events: none;
    }

    .tile.empty:hover {
      background: transparent;
      transform: none;
    }

    #controls {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.6rem 1.6rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    #btnShuffle {
      background: #e94560;
      color: #fff;
    }

    #btnShuffle:hover { background: #c73652; }

    #btnSolve {
      background: #0f3460;
      color: #fff;
      border: 2px solid #e94560;
    }

    #btnSolve:hover { background: #1a4a80; }

    #moves {
      margin-top: 1rem;
      font-size: 1.1rem;
    }

    #message {
      margin-top: 0.8rem;
      font-size: 1.3rem;
      font-weight: bold;
      color: #4caf50;
      min-height: 1.6rem;
    }
  </style>
</head>
<body>
  <h1>15-Tile Puzzle</h1>
  <div id="info">Slide tiles into the correct order (1–15)</div>
  <div id="board"></div>
  <div id="moves">Moves: <span id="moveCount">0</span></div>
  <div id="message"></div>
  <div id="controls">
    <button id="btnShuffle">Shuffle</button>
    <button id="btnSolve">Reset</button>
  </div>

  <script>
    const SIZE = 4;
    const TOTAL = SIZE * SIZE; // 16 cells, tile values 1-15, 0 = empty

    let tiles = [];
    let moveCount = 0;

    const board = document.getElementById('board');
    const moveCountEl = document.getElementById('moveCount');
    const messageEl = document.getElementById('message');

    // ── Initialise solved state ──────────────────────────────────────────────
    function solvedState() {
      return Array.from({ length: TOTAL }, (_, i) => (i + 1) % TOTAL); // 1..15, 0
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      board.innerHTML = '';
      tiles.forEach((val, idx) => {
        const tile = document.createElement('div');
        tile.classList.add('tile');
        if (val === 0) {
          tile.classList.add('empty');
        } else {
          tile.textContent = val;
          tile.addEventListener('click', () => tryMove(idx));
        }
        board.appendChild(tile);
      });
    }

    // ── Move logic ───────────────────────────────────────────────────────────
    function tryMove(idx) {
      const emptyIdx = tiles.indexOf(0);
      if (isAdjacent(idx, emptyIdx)) {
        [tiles[idx], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[idx]];
        moveCount++;
        moveCountEl.textContent = moveCount;
        render();
        checkWin();
      }
    }

    function isAdjacent(a, b) {
      const rowA = Math.floor(a / SIZE), colA = a % SIZE;
      const rowB = Math.floor(b / SIZE), colB = b % SIZE;
      return (rowA === rowB && Math.abs(colA - colB) === 1) ||
             (colA === colB && Math.abs(rowA - rowB) === 1);
    }

    // ── Win check ────────────────────────────────────────────────────────────
    function checkWin() {
      const goal = solvedState();
      if (tiles.every((v, i) => v === goal[i])) {
        messageEl.textContent = `🎉 Solved in ${moveCount} moves!`;
      }
    }

    // ── Shuffle (always generates a solvable permutation) ────────────────────
    function isSolvable(arr) {
      let inv = 0;
      const flat = arr.filter(v => v !== 0);
      for (let i = 0; i < flat.length; i++)
        for (let j = i + 1; j < flat.length; j++)
          if (flat[i] > flat[j]) inv++;
      const emptyRow = SIZE - Math.floor(arr.indexOf(0) / SIZE); // row from bottom (1-indexed)
      // For even-sized grids: solvable if (inv + emptyRow) is even
      return (inv + emptyRow) % 2 === 0;
    }

    function fisherYates(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function shuffle() {
      const goal = solvedState();
      let arr;
      do {
        arr = fisherYates(goal);
      } while (!isSolvable(arr) || arr.every((v, i) => v === goal[i]));
      tiles = arr;
      moveCount = 0;
      moveCountEl.textContent = 0;
      messageEl.textContent = '';
      render();
    }

    // ── Reset to solved state ────────────────────────────────────────────────
    function reset() {
      tiles = solvedState();
      moveCount = 0;
      moveCountEl.textContent = 0;
      messageEl.textContent = '';
      render();
    }

    // ── Keyboard support ─────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      const emptyIdx = tiles.indexOf(0);
      const emptyRow = Math.floor(emptyIdx / SIZE);
      const emptyCol = emptyIdx % SIZE;
      let targetIdx = -1;

      // Arrow key moves the tile INTO the empty space (opposite direction of arrow)
      if (e.key === 'ArrowUp'    && emptyRow < SIZE - 1) targetIdx = emptyIdx + SIZE;
      if (e.key === 'ArrowDown'  && emptyRow > 0)        targetIdx = emptyIdx - SIZE;
      if (e.key === 'ArrowLeft'  && emptyCol < SIZE - 1) targetIdx = emptyIdx + 1;
      if (e.key === 'ArrowRight' && emptyCol > 0)        targetIdx = emptyIdx - 1;

      if (targetIdx !== -1) {
        e.preventDefault();
        tryMove(targetIdx);
      }
    });

    // ── Wire buttons ─────────────────────────────────────────────────────────
    document.getElementById('btnShuffle').addEventListener('click', shuffle);
    document.getElementById('btnSolve').addEventListener('click', reset);

    // ── Start ────────────────────────────────────────────────────────────────
    shuffle();
  </script>
</body>
</html>
